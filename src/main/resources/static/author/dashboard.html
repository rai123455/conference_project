<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабинет автора — Conference KTMU</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background: #f0f2f5; margin: 0; }
        .top-nav { background: #1a1a2e; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; height: 60px; position: sticky; top: 0; z-index: 100; }
        .top-nav .logo { color: #e94560; font-size: 1.3rem; font-weight: 800; text-decoration: none; }
        .top-nav .user-info { color: #ccc; font-size: 0.9rem; display: flex; align-items: center; gap: 1rem; }
        .top-nav .logout-btn { color: #e94560; cursor: pointer; font-weight: 600; background: none; border: none; font-size: 0.9rem; }

        .layout { display: flex; min-height: calc(100vh - 60px); }

        .sidebar {
            background: #1a1a2e;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            width: 220px;
            min-width: 220px;
            min-height: calc(100vh - 60px);
            position: sticky;
            top: 60px;
            align-self: flex-start;
            height: calc(100vh - 60px);
        }

        .sidebar .user-block { text-align: center; padding-bottom: 1.5rem; margin-bottom: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar .avatar { width: 56px; height: 56px; border-radius: 50%; background: #e94560; color: white; font-size: 1.4rem; font-weight: 700; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.7rem; }
        .sidebar .user-name { color: white; font-weight: 600; font-size: 0.95rem; }
        .sidebar .user-role { color: #888; font-size: 0.8rem; margin-top: 0.2rem; }
        .sidebar .menu-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.75rem 1rem; color: #aaa; text-decoration: none; border-radius: 8px; cursor: pointer; border: none; background: none; width: 100%; font-size: 0.9rem; transition: all 0.2s; box-sizing: border-box; }
        .sidebar .menu-item:hover { background: rgba(255,255,255,0.08); color: white; }
        .sidebar .menu-item.active { background: #e94560; color: white; }
        .sidebar .menu-item .icon { font-size: 1.1rem; width: 20px; text-align: center; }
        .sidebar .logout-item { margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); }
        .sidebar .logout-item .menu-item { color: #e94560; }
        .sidebar .logout-item .menu-item:hover { background: rgba(233,69,96,0.15); }

        .main { padding: 2rem; overflow-y: auto; flex: 1; }
        .main h2 { color: #1a1a2e; margin-bottom: 1.5rem; font-size: 1.4rem; }
        .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 1rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 600; color: #333; font-size: 0.9rem; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.75rem 1rem; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 0.95rem; font-family: inherit; transition: border-color 0.2s; box-sizing: border-box; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #e94560; }
        .form-group textarea { min-height: 180px; resize: vertical; }
        .btn { padding: 0.65rem 1.5rem; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: all 0.2s; }
        .btn-primary { background: #e94560; color: white; }
        .btn-primary:hover { background: #c73652; transform: translateY(-1px); }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #219a52; }
        .alert { padding: 0.8rem 1.2rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
        .alert-error { background: #fee2e2; color: #991b1b; }
        .alert-success { background: #dcfce7; color: #166534; }
        .article-item { background: white; border-radius: 12px; padding: 1.2rem 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 1rem; border-left: 4px solid #e0e0e0; }
        .article-item.pending { border-left-color: #f59e0b; }
        .article-item.under_review { border-left-color: #3b82f6; }
        .article-item.published { border-left-color: #22c55e; }
        .article-item.revision { border-left-color: #e94560; }
        .article-item-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem; }
        .article-item h3 { color: #1a1a2e; font-size: 1rem; }
        .badge { padding: 0.25rem 0.7rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-review { background: #dbeafe; color: #1e40af; }
        .badge-published { background: #dcfce7; color: #166534; }
        .badge-revision { background: #fee2e2; color: #991b1b; }
        .revision-box { background: #fff5f7; border: 1px solid #fecdd3; border-radius: 8px; padding: 1rem; margin-top: 0.8rem; }
        .revision-box p { color: #e94560; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.7rem; }

        /* Публикации внутри кабинета */
        .pub-card { background: white; border-radius: 12px; padding: 1.2rem 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 1rem; border-left: 4px solid #22c55e; cursor: pointer; transition: transform 0.2s; }
        .pub-card:hover { transform: translateY(-2px); }
        .pub-card h3 { color: #1a1a2e; font-size: 1rem; margin-bottom: 0.4rem; }
        .pub-card .topic-tag { background: #fff0f3; color: #e94560; padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.78rem; font-weight: 600; display: inline-block; margin-bottom: 0.6rem; }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="#" class="logo">📰 Conference KTMU</a>
    <div class="user-info">
        Привет, <span id="userName" style="color:white; font-weight:600;"></span>
        <button class="logout-btn" onclick="logout()">Выйти</button>
    </div>
</nav>

<div class="layout">
    <div class="sidebar">
        <div class="user-block">
            <div class="avatar" id="avatarLetter"></div>
            <div class="user-name" id="sidebarName"></div>
            <div class="user-role">Автор</div>
        </div>

        <button class="menu-item active" id="btn-new" onclick="showSection('newArticle')">
            <span class="icon">✏️</span> Написать статью
        </button>
        <button class="menu-item" id="btn-my" onclick="showSection('myArticles')">
            <span class="icon">📄</span> Мои статьи
        </button>
        <button class="menu-item" id="btn-pub" onclick="showSection('allPublished')">
            <span class="icon">🌐</span> Все публикации
        </button>

        <div class="logout-item">
            <button class="menu-item" onclick="logout()">
                <span class="icon">🚪</span> Выйти
            </button>
        </div>
    </div>

    <div class="main">

        <!-- Написать статью (отправка в формате PDF) -->
        <div id="newArticle">
            <h2>✏️ Отправить статью</h2>
            <div class="card">
                <div id="articleError" class="alert alert-error" style="display:none;"></div>
                <div id="articleSuccess" class="alert alert-success" style="display:none;"></div>
                <div class="form-group">
                    <label>Заголовок статьи</label>
                    <input type="text" id="title" placeholder="Введите заголовок">
                </div>
                <div class="form-group">
                    <label>Тема / направление</label>
                    <input type="text" id="topic" placeholder="Например: Информатика, Медицина...">
                </div>

                <div class="form-group">
                    <label>Факультет</label>
                    <select id="faculty">
                        <option value="">-- Выберите факультет --</option>
                        <option value="Инженерный факультет">🔧 Инженерный факультет</option>
                        <option value="Факультет коммуникации">📡 Факультет коммуникации</option>
                        <option value="Гуманитарный факультет">📚 Гуманитарный факультет</option>
                        <option value="Факультет экономики и управления">📈 Факультет экономики и управления</option>
                        <option value="Факультет Естественных наук">🔬 Факультет Естественных наук</option>
                        <option value="Факультет Искусств">🎨 Факультет Искусств</option>
                        <option value="Факультет теологии">🕌 Факультет теологии</option>
                        <option value="Факультет спортивных наук">⚽ Факультет спортивных наук</option>
                        <option value="Факультет туризма">✈️ Факультет туризма</option>
                        <option value="Ветеринарный факультет">🐾 Ветеринарный факультет</option>
                        <option value="Сельскохозяйственный факультет">🌾 Сельскохозяйственный факультет</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>PDF файл статьи</label>
                    <div id="dropZone" style="border:2px dashed #e0e0e0; border-radius:12px; padding:2.5rem; text-align:center; cursor:pointer; transition:all 0.2s; background:#fafafa;">
                        <div style="font-size:2.5rem; margin-bottom:0.5rem;">📄</div>
                        <p style="color:#666; font-weight:600;">Нажмите или перетащите PDF файл</p>
                        <p style="color:#aaa; font-size:0.85rem; margin-top:0.3rem;">Только .pdf формат</p>
                        <input type="file" id="pdfFile" accept=".pdf" style="display:none;">
                    </div>
                    <div id="fileInfo" style="display:none; margin-top:0.8rem; padding:0.8rem 1rem; background:#f0fdf4; border:1px solid #86efac; border-radius:8px; align-items:center; gap:0.8rem;">
                        <span style="font-size:1.3rem;">✅</span>
                        <div>
                            <div style="font-weight:600; color:#166534;" id="fileName"></div>
                            <div style="font-size:0.8rem; color:#888;" id="fileSize"></div>
                        </div>
                        <button onclick="clearFile()" style="margin-left:auto; background:none; border:none; cursor:pointer; color:#e94560; font-size:1.1rem;">✕</button>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="handleUpload()" id="submitBtn">
                    Отправить на проверку →
                </button>
            </div>
        </div>

        <!-- Мои статьи -->
        <div id="myArticles" style="display:none;">
            <h2>📄 Мои статьи</h2>
            <div id="articlesList"><p style="color:#888;">Загрузка...</p></div>
        </div>

        <!-- Все публикации внутри кабинета -->
        <div id="allPublished" style="display:none;">
            <h2>🌐 Все публикации</h2>
            <div id="publishedList"><p style="color:#888;">Загрузка...</p></div>
        </div>

    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
    requireAuth('AUTHOR');
    showUserName();

    const name = localStorage.getItem('name') || 'А';
    document.getElementById('sidebarName').textContent = name;
    document.getElementById('avatarLetter').textContent = name[0].toUpperCase();

    // ── Drag & Drop ────────────────────────────────────
    const dropZone = document.getElementById('dropZone');
    const pdfInput = document.getElementById('pdfFile');

    dropZone.addEventListener('click', () => pdfInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#e94560'; dropZone.style.background = '#fff0f3'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#e0e0e0'; dropZone.style.background = '#fafafa'; });
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.style.borderColor = '#e0e0e0'; dropZone.style.background = '#fafafa'; const file = e.dataTransfer.files[0]; if (file) showFileInfo(file); });
    pdfInput.addEventListener('change', () => { if (pdfInput.files[0]) showFileInfo(pdfInput.files[0]); });

    function showFileInfo(file) {
        if (!file.name.endsWith('.pdf')) { alert('Пожалуйста загрузите PDF файл'); return; }
        document.getElementById('fileName').textContent = file.name;
        document.getElementById('fileSize').textContent = (file.size / 1024 / 1024).toFixed(2) + ' МБ';
        document.getElementById('fileInfo').style.display = 'flex';
        dropZone.style.borderColor = '#22c55e';
    }

    function clearFile() {
        pdfInput.value = '';
        document.getElementById('fileInfo').style.display = 'none';
        dropZone.style.borderColor = '#e0e0e0';
    }

    // ── Переключение разделов ──────────────────────────
    function showSection(section) {
        ['newArticle','myArticles','allPublished'].forEach(s => document.getElementById(s).style.display = 'none');
        ['btn-new','btn-my','btn-pub'].forEach(b => document.getElementById(b).classList.remove('active'));

        document.getElementById(section).style.display = 'block';
        const btnMap = { newArticle: 'btn-new', myArticles: 'btn-my', allPublished: 'btn-pub' };
        document.getElementById(btnMap[section]).classList.add('active');

        if (section === 'myArticles') loadMyArticles();
        if (section === 'allPublished') loadAllPublished();
    }

    // ── Отправка PDF ───────────────────────────────────
    async function handleUpload() {
        const title = document.getElementById('title').value.trim();
        const topic = document.getElementById('topic').value.trim();
        const faculty = document.getElementById('faculty').value;
        const file = pdfInput.files[0];
        const authorId = localStorage.getItem('userId');
        const err = document.getElementById('articleError');
        const suc = document.getElementById('articleSuccess');

        err.style.display = 'none';
        suc.style.display = 'none';

        if (!title) { err.textContent = 'Введите заголовок'; err.style.display = 'block'; return; }
        if (!faculty) { err.textContent = 'Выберите факультет'; err.style.display = 'block'; return; }
        if (!file)  { err.textContent = 'Выберите PDF файл'; err.style.display = 'block'; return; }

        const btn = document.getElementById('submitBtn');
        btn.textContent = 'Отправка...';
        btn.disabled = true;

        try {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('title', title);
            formData.append('topic', topic || '');
            formData.append('faculty', faculty);
            formData.append('authorId', authorId);

<!--            const res = await fetch('http://localhost:8080/api/articles/upload', {-->
            const res = await fetch(`${window.location.origin}/api/articles/upload`, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                body: formData
            });

            if (!res.ok) throw new Error('Ошибка загрузки');
            suc.textContent = '✅ Статья отправлена на проверку администратору!';
            suc.style.display = 'block';
            document.getElementById('title').value = '';
            document.getElementById('topic').value = '';
            clearFile();
        } catch (e) {
            err.textContent = 'Ошибка: ' + e.message;
            err.style.display = 'block';
        } finally {
            btn.textContent = 'Отправить на проверку →';
            btn.disabled = false;
        }
    }

    // ── Мои статьи ─────────────────────────────────────
    async function loadMyArticles() {
        const authorId = localStorage.getItem('userId');
        const list = document.getElementById('articlesList');
        try {
            const articles = await getMyArticles(authorId);
            if (articles.length === 0) {
                list.innerHTML = '<div class="card"><p style="color:#888; text-align:center;">У вас пока нет статей</p></div>';
                return;
            }
            list.innerHTML = articles.map(a => `
                <div class="article-item ${a.status.toLowerCase()}">
                    <div class="article-item-header">
                        <h3>${a.title}</h3>
                        <span class="badge ${getBadgeClass(a.status)}">${getStatusText(a.status)}</span>
                    </div>
                    <p style="color:#888; font-size:0.85rem; margin-bottom:0.5rem;">Тема: ${a.topic || 'не указана'}</p>
                    ${a.filePath ? `
<!--                        <a href="http://localhost:8080/api/articles/${a.id}/file" target="_blank"-->
                        <a href="${window.location.origin}/api/articles/${a.id}/file" target="_blank"
                           style="display:inline-flex; align-items:center; gap:0.4rem; color:#e94560; font-weight:600; font-size:0.9rem; text-decoration:none; margin-bottom:0.8rem;">
                            📄 Открыть мой PDF
                        </a>` : ''}
                    ${a.status === 'REVISION' ? `
                        <div class="revision-box">
                            <p>⚠️ Требуется доработка — загрузите исправленный PDF</p>
                            <input type="file" id="revision_${a.id}" accept=".pdf" style="margin-bottom:0.7rem; font-size:0.9rem; width:100%;">
                            <button class="btn btn-success" onclick="handleResubmitPdf(${a.id})">Отправить доработку →</button>
                        </div>` : ''}
                </div>
            `).join('');
        } catch(e) {
            list.innerHTML = '<p style="color:red;">Ошибка загрузки статей</p>';
        }
    }

    // ── Все публикации внутри кабинета ─────────────────
    async function loadAllPublished() {
        const list = document.getElementById('publishedList');
        list.innerHTML = '<p style="color:#888;">Загрузка...</p>';
        try {
<!--            const res = await fetch('http://localhost:8080/api/articles/published');-->
            const res = await fetch(`${window.location.origin}/api/articles/published`);
            const articles = await res.json();
            if (articles.length === 0) {
                list.innerHTML = '<p style="color:#888; text-align:center;">Нет опубликованных статей</p>';
                return;
            }
            list.innerHTML = articles.map(a => `
                <div class="pub-card" onclick="window.open('../article.html?id=${a.id}', '_blank')">
                    <span class="topic-tag">${a.topic || 'Без темы'}</span>
                    <h3>${a.title}</h3>
                    <p style="color:#555; font-size:0.9rem; line-height:1.6;">${(a.content || '').substring(0, 150)}...</p>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:0.5rem;">
                        <span style="color:#888; font-size:0.82rem;">✅ Автор: ${a.author.name}</span>
                        <span style="color:#e94560; font-weight:600; font-size:0.85rem;">Читать далее →</span>
                    </div>
                </div>
            `).join('');
        } catch(e) {
            list.innerHTML = '<p style="color:red;">Ошибка загрузки</p>';
        }
    }

    async function handleResubmitPdf(articleId) {
        const input = document.getElementById(`revision_${articleId}`);
        const file = input.files[0];
        if (!file) { alert('Выберите PDF файл'); return; }
        const formData = new FormData();
        formData.append('file', file);
        try {
<!--            const res = await fetch(`http://localhost:8080/api/articles/${articleId}/resubmit-pdf`, {-->
            const res = await fetch(`${window.location.origin}/api/articles/${articleId}/resubmit-pdf`, {
                method: 'PUT',
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                body: formData
            });
            if (!res.ok) throw new Error('Ошибка');
            alert('✅ Доработка отправлена!');
            loadMyArticles();
        } catch(e) {
            alert('Ошибка: ' + e.message);
        }
    }

    function getBadgeClass(status) {
        const map = { 'PENDING':'badge-pending','UNDER_REVIEW':'badge-review','PUBLISHED':'badge-published','REVISION':'badge-revision' };
        return map[status] || 'badge-pending';
    }
    function getStatusText(status) {
        const map = { 'PENDING':'⏳ У админа','UNDER_REVIEW':'🔍 На рецензии','PUBLISHED':'✅ Опубликована','REVISION':'✏️ На доработке' };
        return map[status] || status;
    }
</script>
</body>
</html>
